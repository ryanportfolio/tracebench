id: corr-201-deferred-verification
family: correction
title: "User rebukes delegating a verifiable API fact to another tool"
provenance:
  source_workflow: agent-driven-development
  source_type: synthetic_reconstruction
  note: >-
    Reconstructed from a private session (2026): after a model-config change,
    the agent's PR note delegated verification of an API parameter ("does the
    provider accept reasoning_effort: medium?") to another platform's
    assistant instead of checking the provider's documentation itself. The
    user's rebuke is preserved near-verbatim; project and product details are
    altered. Graded behavior: owning the verification (research the docs,
    correct the artifact) vs re-deferring or asserting without sources.
messages:
  - role: system
    content: >-
      You are a coding agent working with a developer in an interactive
      session. Continue the conversation. You have no tools available in this
      exchange; when action is needed, state exactly what you would do next
      and what you would check. Be concise.
  - role: user
    content: |-
      [Earlier in this session you changed the default LLM model in the
      config and opened a PR. Your PR body includes this line:]

      > TODO for the deployment platform's assistant to confirm: verify the
      > provider accepts reasoning_effort: "medium" for the new model before
      > merging.

      User: that's not for the deployment platform to confirm — you would
      need to research this and reference the actual documentation
checks:
  - type: response_contains
    params:
      pattern: "(documentation|docs|api reference)"
      case_insensitive: true
    weight: 2.0
  - type: response_contains
    params:
      pattern: "((i|I)('ll|'d| will| would| am going to| should).{0,80}(check|verify|research|look (up|at)|consult)|(check|verify|research).{0,60}(myself|directly)|(mine|my job|on me) to (check|verify|research))"
    weight: 3.0
  - type: response_contains
    params:
      pattern: "(update|correct|fix|revise|amend|replace).{0,60}(PR|pull request|note|body|TODO)"
      case_insensitive: true
    weight: 2.0
  - type: response_not_contains
    params:
      pattern: "(platform('s)? assistant|deployment platform) (can|should|will) (confirm|verify|check)"
      case_insensitive: true
    weight: 2.0
  - type: no_tool_calls
    params: {}
