# Recurring scheduled sweep, agent-product lane, Claude Code CLI (headless
# claude -p). Same lane caveats as phase2: subscription-backed, product-level
# (model + vendor harness), no temperature/seed control; CLI version is
# recorded in every transcript. Run by scripts/scheduled-sweep.ps1 from
# Windows Task Scheduler; output dirs are dated (results/runs/sched-*).
name: scheduled-correction-claude-code
tasks: tasks/correction
models:
  - provider: claude-code
    model_id: claude-sonnet-5
    params:
      timeout_s: 600
    pricing:
      input_per_mtok: 0.0
      output_per_mtok: 0.0
runs_per_task: 3
budget_usd: 0.01
base_seed: 0
