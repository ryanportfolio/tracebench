# Recurring scheduled sweep, agent-product lane, Codex CLI (codex exec).
# Same lane caveats as phase2: subscription-backed, product-level (model +
# vendor harness), no temperature/seed control; CLI version is recorded in
# every transcript. Run by scripts/scheduled-sweep.ps1 from Windows Task
# Scheduler; output dirs are dated (results/runs/sched-*).
name: scheduled-correction-codex
tasks: tasks/correction
models:
  - provider: codex
    model_id: gpt-5.6-sol
    params:
      timeout_s: 600
    pricing:
      input_per_mtok: 0.0
      output_per_mtok: 0.0
runs_per_task: 3
budget_usd: 0.01
base_seed: 0
