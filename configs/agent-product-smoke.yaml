# Agent-product lane smoke config: drives local agent CLIs headlessly under
# a subscription. Measures model + product harness (system prompt, tools,
# scaffolding), NOT the raw model — a different claim than the API lane, and
# labeled as such wherever results are published.
#
# runs_per_task: 1 here because this is a smoke config (does the adapter
# work end-to-end?). Published agent-product results use N>=3 like every
# other lane. Pricing is zero: subscription lane, no marginal cost; the CLI
# version is recorded into every transcript instead of pinned params.
name: agent-product-smoke
tasks: tasks
models:
  # Requires the standalone claude CLI to be logged in on this machine
  # (`claude` once interactively, or `claude setup-token`). Desktop-app
  # sessions hold auth in the host app and do not cover headless `claude -p`.
  - provider: claude-code
    model_id: sonnet
    params:
      timeout_s: 600
    pricing:
      input_per_mtok: 0.0
      output_per_mtok: 0.0
  # Model must be one the signed-in account may use; gpt-5.6-sol is the
  # CLI default for ChatGPT-subscription accounts as of codex-cli 0.144.0.
  - provider: codex
    model_id: gpt-5.6-sol
    params:
      timeout_s: 600
    pricing:
      input_per_mtok: 0.0
      output_per_mtok: 0.0
runs_per_task: 1
budget_usd: 0.01
base_seed: 0
