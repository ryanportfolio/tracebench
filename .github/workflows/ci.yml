name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -q

      - name: Validate committed tasks
        run: uv run tracebench validate tasks

      - name: Dry run (mock provider, zero spend)
        run: uv run tracebench run --config configs/dryrun.yaml --out .tmp/ci-dryrun
