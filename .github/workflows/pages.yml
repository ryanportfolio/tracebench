name: Publish report to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build dashboard UI
        run: |
          npm --prefix ui ci
          npm --prefix ui run build

      # The public site serves the committed, curated runs under results/runs.
      - name: Stage published run data
        run: |
          uv sync --dev
          uv run tracebench ui-data \
            --runs-dir results/runs \
            --out ui/dist/data \
            --note "Early results: agent-product lane (subscription CLIs, product-level — model + vendor harness, no temperature/seed control). One practitioner's workflow-specific evals; N=3 per task, spread shown."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
