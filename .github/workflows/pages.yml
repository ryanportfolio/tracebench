name: Publish report to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build dashboard UI
        run: |
          npm --prefix ui ci
          npm --prefix ui run build

      # Until the first real sweep is published (phase 3), the public site
      # carries a clearly-labeled demo run generated from the mock dry run.
      - name: Stage demo run data
        run: |
          uv run tracebench run --config configs/dryrun.yaml --out .tmp/pages-runs/dryrun
          uv run tracebench ui-data \
            --runs-dir .tmp/pages-runs \
            --out ui/dist/data \
            --note "Demo data from the mock dry-run config (scripted responses, zero API spend). No real model results yet — the first published sweep replaces this."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
